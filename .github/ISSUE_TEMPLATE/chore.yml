name: Chore
description: Maintenance, refactor, dependency update, or any non-feature non-bug task.
labels: [chore]
body:
  - type: textarea
    id: what
    attributes:
      label: What needs doing?
      description: A clear, one- or two-sentence description of the task.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: Relevant context, constraints, or links. Skip if self-evident.
    validations:
      required: false
