# Automatically classify every PR as risk:high or risk:low, apply the
# matching label, post (or update) an explanatory comment, and — for
# risk:high PRs — request a review from @kipyin.
#
# Risk criteria (mirrors CODEOWNERS and AGENTS.md "agent-unsafe" list):
#   risk:high  — any change touches data model, migrations, DB layer,
#                update/patch logic, dependencies, or CI pipelines.
#   risk:low   — all changes are in tests, docs, or pure UI/service code.

name: PR Triage – Risk Classification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write  # required to create / manage labels

jobs:
  triage:
    name: Classify PR risk
    runs-on: ubuntu-latest

    steps:
      - name: Classify risk, label PR, and comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          TOKEN = os.environ["GITHUB_TOKEN"]
          REPO = os.environ["REPO"]
          PR_NUMBER = os.environ["PR_NUMBER"]
          PR_AUTHOR = os.environ["PR_AUTHOR"]
          EVENT_ACTION = os.environ["EVENT_ACTION"]

          OWNER_LOGIN = "kipyin"
          TRIAGE_MARKER = "<!-- pr-triage-comment -->"

          # ── Path patterns ──────────────────────────────────────────────────
          # Any changed file matching one of these forces a risk:high rating.
          HIGH_RISK_PATTERNS = [
              # Data model & schema
              "src/handoff/models.py",
              "src/handoff/db.py",
              "src/handoff/backup_schema.py",
              # DB migrations (prefix match)
              "src/handoff/migrations/",
              # Core data-access layer
              "src/handoff/data.py",
              # Update / patch / path logic (security boundary)
              "src/handoff/updater.py",
              "src/handoff/autosave.py",
              "src/handoff/paths.py",
              # Project dependencies
              "pyproject.toml",
              "uv.lock",
              # CI/CD pipeline definitions (prefix match)
              ".github/workflows/",
          ]

          # ── Helpers ────────────────────────────────────────────────────────
          def api(method, path, data=None, *, ignore_404=False):
              url = f"https://api.github.com{path}"
              body = json.dumps(data).encode() if data is not None else None
              req = urllib.request.Request(
                  url,
                  data=body,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as exc:
                  if ignore_404 and exc.code == 404:
                      return None
                  body_text = exc.read().decode(errors="replace")
                  print(f"GitHub API error {exc.code} {method} {path}: {body_text}", file=sys.stderr)
                  raise

          def get_pr_files():
              """Return all filenames changed in the PR (handles pagination)."""
              files = []
              page = 1
              while True:
                  batch = api("GET", f"/repos/{REPO}/pulls/{PR_NUMBER}/files?per_page=100&page={page}")
                  if not batch:
                      break
                  files.extend(f["filename"] for f in batch)
                  if len(batch) < 100:
                      break
                  page += 1
              return files

          def matches_high_risk(filename):
              for pattern in HIGH_RISK_PATTERNS:
                  if pattern.endswith("/"):
                      if filename.startswith(pattern):
                          return True
                  elif filename == pattern:
                      return True
              return False

          def classify(filenames):
              """Return (risk_level, list_of_triggering_files)."""
              hits = [f for f in filenames if matches_high_risk(f)]
              if hits:
                  return "high", hits
              return "low", []

          def ensure_label(name, color, description):
              """Create the label if it does not already exist."""
              encoded = urllib.parse.quote(name, safe="")
              existing = api("GET", f"/repos/{REPO}/labels/{encoded}", ignore_404=True)
              if existing is None:
                  api("POST", f"/repos/{REPO}/labels", {
                      "name": name,
                      "color": color,
                      "description": description,
                  })

          def get_pr_label_names():
              pr = api("GET", f"/repos/{REPO}/pulls/{PR_NUMBER}")
              return [lbl["name"] for lbl in pr.get("labels", [])]

          def remove_label(name):
              encoded = urllib.parse.quote(name, safe="")
              api("DELETE", f"/repos/{REPO}/issues/{PR_NUMBER}/labels/{encoded}", ignore_404=True)

          def add_label(name):
              api("POST", f"/repos/{REPO}/issues/{PR_NUMBER}/labels", {"labels": [name]})

          def find_triage_comment():
              """Return the comment id of an existing triage comment, or None."""
              page = 1
              while True:
                  comments = api("GET", f"/repos/{REPO}/issues/{PR_NUMBER}/comments?per_page=100&page={page}")
                  if not comments:
                      break
                  for c in comments:
                      if TRIAGE_MARKER in c.get("body", ""):
                          return c["id"]
                  if len(comments) < 100:
                      break
                  page += 1
              return None

          def upsert_comment(body):
              full_body = f"{TRIAGE_MARKER}\n{body}"
              comment_id = find_triage_comment()
              if comment_id:
                  api("PATCH", f"/repos/{REPO}/issues/comments/{comment_id}", {"body": full_body})
              else:
                  api("POST", f"/repos/{REPO}/issues/{PR_NUMBER}/comments", {"body": full_body})

          def request_review():
              """Request review from OWNER_LOGIN (idempotent — GitHub deduplicates)."""
              if PR_AUTHOR == OWNER_LOGIN:
                  return  # owner reviewing their own PR; skip
              try:
                  api("POST", f"/repos/{REPO}/pulls/{PR_NUMBER}/requested_reviewers",
                      {"reviewers": [OWNER_LOGIN]})
              except urllib.error.HTTPError:
                  pass  # reviewer may already be assigned or be the PR author

          # ── Main ───────────────────────────────────────────────────────────
          filenames = get_pr_files()
          risk_level, trigger_files = classify(filenames)

          # Ensure both labels exist in the repo
          ensure_label("risk:high", "b60205",
                       "Touches critical code — requires manual review by @kipyin")
          ensure_label("risk:low",  "0e8a16",
                       "Agent-safe change — no critical paths modified")

          # Swap labels
          current_labels = get_pr_label_names()
          if risk_level == "high":
              if "risk:low" in current_labels:
                  remove_label("risk:low")
              if "risk:high" not in current_labels:
                  add_label("risk:high")
          else:
              if "risk:high" in current_labels:
                  remove_label("risk:high")
              if "risk:low" not in current_labels:
                  add_label("risk:low")

          # Build comment
          if risk_level == "high":
              trigger_list = "\n".join(f"- `{f}`" for f in trigger_files[:20])
              if len(trigger_files) > 20:
                  trigger_list += f"\n- … and {len(trigger_files) - 20} more"
              comment = f"""\
          ## 🔴 risk:high — Manual review required

          This PR touches one or more **critical paths** that must be reviewed by @{OWNER_LOGIN} before merging:

          {trigger_list}

          **Why these files are critical:**
          | Path | Reason |
          |------|--------|
          | `src/handoff/models.py` | Data model — schema changes affect every layer |
          | `src/handoff/db.py` | Database initialization and migration runner |
          | `src/handoff/backup_schema.py` | Backup/restore contract |
          | `src/handoff/migrations/` | DB migrations — irreversible in production |
          | `src/handoff/data.py` | Core data-access layer |
          | `src/handoff/updater.py` | Patch/update logic — security boundary |
          | `src/handoff/autosave.py` | Shared mutable state |
          | `src/handoff/paths.py` | File-system paths — path-traversal risk |
          | `pyproject.toml` / `uv.lock` | Dependency changes |
          | `.github/workflows/` | CI/CD pipeline — can affect all automation |

          A review from @{OWNER_LOGIN} has been requested automatically.
          """
              request_review()
          else:
              comment = f"""\
          ## 🟢 risk:low — Agent-safe change

          All {len(filenames)} changed file(s) in this PR are in **agent-safe paths** \
          (tests, docs, UI pages, service layer) and do not touch any critical code areas. \
          This PR can be merged without a manual review by @{OWNER_LOGIN} if CI is green.

          > If you believe this classification is wrong, add the `risk:high` label manually.
          """

          upsert_comment(comment)
          print(f"PR #{PR_NUMBER} classified as risk:{risk_level}.")
          PYEOF
